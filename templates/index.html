<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Casino MAX</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#07070c;
    color:white;
}

/* screens */
.screen{display:none;}
.active{display:block;}

.header{
    display:flex;
    justify-content:space-between;
    padding:15px;
}

.balance{color:#00ff9d;}

.games{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:10px;
}

.card{
    background:#14141c;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.navbar{
    position:fixed;
    bottom:0;
    width:100%;
    background:#111;
    display:flex;
    justify-content:space-around;
    padding:10px;
}

/* game */
.game-area{
    height:200px;
    background:#111;
    margin:10px;
    border-radius:15px;
    position:relative;
}

canvas{position:absolute;}

.rocket{
    position:absolute;
    width:40px;
}

.multi{
    text-align:center;
    font-size:30px;
    color:#00ffcc;
}

button{
    padding:12px;
    width:100%;
    margin-top:10px;
    border:none;
    border-radius:10px;
}

.start{background:#00ff88;}
.cash{background:#ff4444;}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen active">
<div class="header">
🎰 Casino
<div class="balance">$ <span id="b1">1000</span></div>
</div>

<div class="games">
<div class="card" onclick="go('jet')">🚀 Lucky Jet</div>
<div class="card" onclick="go('roulette')">🎡 Рулетка</div>
<div class="card" onclick="go('blackjack')">🃏 Blackjack</div>
<div class="card" onclick="go('profile')">👤 Профиль</div>
</div>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">
<div class="header">Профиль</div>
<h2>Игрок</h2>
<p>Баланс: $<span id="b2">1000</span></p>
</div>

<!-- LUCKY JET -->
<div id="jet" class="screen">
<div class="header">
⬅ <span onclick="go('menu')">Назад</span>
<div class="balance">$ <span id="b3">1000</span></div>
</div>

<div class="game-area">
<canvas id="c"></canvas>
<img id="r" class="rocket" src="https://cdn-icons-png.flaticon.com/512/3219/3219536.png">
</div>

<div class="multi" id="m">x1.00</div>

<input id="bet" value="100">

<button class="start" onclick="start()">СТАРТ</button>
<button class="cash" onclick="cash()">ЗАБРАТЬ</button>
</div>

<!-- ROULETTE -->
<div id="roulette" class="screen">
<div class="header">
⬅ <span onclick="go('menu')">Назад</span>
</div>

<h2 style="text-align:center">🎡 Рулетка</h2>
<div class="multi" id="roll">⚪</div>
<input id="bet2" value="100">
<button onclick="spin()">Крутить</button>
</div>

<!-- BLACKJACK -->
<div id="blackjack" class="screen">
<div class="header">
⬅ <span onclick="go('menu')">Назад</span>
</div>

<p>Ты: <span id="p"></span></p>
<p>Дилер: <span id="d"></span></p>

<button onclick="bjStart()">Начать</button>
<button onclick="hit()">Взять</button>
<button onclick="stand()">Стоп</button>
</div>

<!-- NAV -->
<div class="navbar">
<div onclick="go('menu')">🏠</div>
<div onclick="go('jet')">🚀</div>
<div onclick="go('profile')">👤</div>
</div>

<script>
let bal = localStorage.getItem("bal") || 1000;
function upd(){
    document.querySelectorAll("[id^=b]").forEach(e=>e.innerText=bal);
    localStorage.setItem("bal",bal);
}
upd();

function go(id){
    document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// LUCKY JET
let multi=1,run=false,int;
let ctx=c.getContext("2d");
c.width=300;c.height=200;

function start(){
if(run)return;
let bet=+bet.value;
if(bet>bal)return;
bal-=bet;upd();

multi=1;run=true;
ctx.beginPath();ctx.moveTo(0,200);

int=setInterval(()=>{
multi+=0.05;
let x=multi*30,y=200-multi*20;
ctx.lineTo(x,y);ctx.stroke();
r.style.left=x+"px";
r.style.bottom=multi*10+"px";
m.innerText="x"+multi.toFixed(2);

if(Math.random()<0.03){crash();}
},100);
}

function crash(){
clearInterval(int);
run=false;
m.innerText="💥";
}

function cash(){
if(!run)return;
clearInterval(int);
run=false;
let win=bet.value*multi;
bal+=Math.floor(win);upd();
m.innerText="+"+Math.floor(win);
}

// ROULETTE
function spin(){
let bet=+bet2.value;
let i=0;
let anim=setInterval(()=>{
roll.innerText=i%2?"🔴":"⚫";
i++;
},100);

setTimeout(()=>{
clearInterval(anim);
let win=Math.random()>0.5;
roll.innerText=win?"🔴":"⚫";
bal+=win?bet:-bet;
upd();
},2000);
}

// BLACKJACK
let pc=[],dc=[];
function card(){return Math.floor(Math.random()*11)+1;}
function sum(a){return a.reduce((x,y)=>x+y,0);}

function bjStart(){
pc=[card(),card()];
dc=[card()];
show();
}

function hit(){pc.push(card());show();}
function stand(){
while(sum(dc)<17)dc.push(card());
bal+=sum(pc)>sum(dc)?100:-100;
upd();show();
}

function show(){
p.innerText=pc.join(",");
d.innerText=dc.join(",");
}
</script>

</body>
</html>
