<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Casino</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: black;
    color: white;
}

.header {
    padding: 15px;
    font-size: 20px;
    border-bottom: 1px solid #333;
}

.balance {
    float: right;
}

.menu {
    display: flex;
    justify-content: space-around;
    margin-top: 20px;
}

.btn {
    padding: 15px;
    background: #111;
    border-radius: 10px;
    text-align: center;
    width: 40%;
}

.section {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

input {
    padding: 10px;
    width: 100%;
    margin-top: 10px;
}
</style>

</head>
<body>

<div class="header">
    Казино 🎰
    <span class="balance">💰 <span id="balance">1000</span></span>
</div>

<div class="menu">
    <div class="btn" onclick="openTab('games')">Игры</div>
    <div class="btn" onclick="openTab('profile')">Профиль</div>
</div>

<div id="games" class="section active">
    <h2>🎲 Игры</h2>

    <button onclick="blackjack()">Blackjack</button>
    <button onclick="roulette()">Рулетка</button>
    <button onclick="lucky()">Lucky Jet</button>

    <p id="gameResult"></p>
</div>

<div id="profile" class="section">
    <h2>👤 Профиль</h2>

    <input id="name" placeholder="Введите ник">
    <button onclick="saveProfile()">Сохранить</button>

    <p id="profileName"></p>
</div>

<script>
let balance = 1000;

function updateBalance() {
    document.getElementById("balance").innerText = balance;
}

function openTab(tab) {
    document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
}

function blackjack() {
    let win = Math.random() > 0.5;
    if (win) balance += 100;
    else balance -= 100;

    document.getElementById("gameResult").innerText = win ? "Ты выиграл 🎉" : "Ты проиграл 😢";
    updateBalance();
}

function roulette() {
    let win = Math.random() > 0.5;
    if (win) balance += 200;
    else balance -= 200;

    document.getElementById("gameResult").innerText = win ? "Красное! +200 🔴" : "Чёрное! -200 ⚫";
    updateBalance();
}

function lucky() {
    let multiplier = (Math.random() * 5).toFixed(2);
    let win = multiplier > 2;

    if (win) balance += 150;
    else balance -= 150;

    document.getElementById("gameResult").innerText =
        "Коэф: x" + multiplier + (win ? " 🚀 выиграл!" : " 💥 проиграл");
    updateBalance();
}

function saveProfile() {
    let name = document.getElementById("name").value;
    document.getElementById("profileName").innerText = "Ник: " + name;
}
</script>

</body>
</html>
