<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Casino MAX</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#050505;
    color:white;
}

.header {
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#111;
}

.balance {
    color:#00ff99;
}

.menu {
    display:flex;
    gap:10px;
    padding:10px;
}

.tab {
    flex:1;
    padding:12px;
    background:#1a1a1a;
    border-radius:10px;
    text-align:center;
}

.section { display:none; padding:10px; }
.active { display:block; }

.card {
    background:#0f0f0f;
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

button {
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#00ff99;
    border:none;
    border-radius:10px;
    font-weight:bold;
}

input {
    width:100%;
    padding:10px;
    background:#222;
    color:white;
    border:none;
}

.multi {
    font-size:45px;
    text-align:center;
    text-shadow:0 0 20px #00ff99;
    animation:pulse 1s infinite;
}

@keyframes pulse {
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}

canvas {
    background:black;
    border-radius:10px;
}

.players {
    font-size:12px;
    max-height:100px;
    overflow:hidden;
}

.history {
    display:flex;
    gap:5px;
    overflow-x:auto;
    margin-top:10px;
}

.history div {
    padding:5px;
    background:#111;
    border-radius:5px;
}
</style>

</head>
<body>

<div class="header">
🎰 Casino MAX
<div class="balance">💰 <span id="balance">1000</span></div>
</div>

<div class="menu">
<div class="tab" onclick="show('game')">🎮</div>
<div class="tab" onclick="show('profile')">👤</div>
</div>

<!-- GAME -->
<div id="game" class="section active">
<div class="card">

<canvas id="chart" width="300" height="150"></canvas>

<input id="bet" value="100">

<div class="multi" id="multi">x1.00</div>

<button onclick="start()">СТАРТ</button>
<button onclick="cash()">ЗАБРАТЬ</button>

<div class="players" id="players"></div>
<div class="history" id="history"></div>

</div>
</div>

<!-- PROFILE -->
<div id="profile" class="section">
<div class="card">

<h3>👤 Профиль</h3>

<input id="name" placeholder="Ник">
<input id="avatar" placeholder="Ссылка на фото">

<button onclick="save()">Сохранить</button>

<p id="nick"></p>
<img id="img" width="80">

</div>
</div>

<script>

// 🔊 SOUND
let bg = new Audio("https://assets.mixkit.co/music/preview/mixkit-tech-house-vibes-130.mp3");
bg.loop=true;

let win = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3");
let lose = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-arcade-retro-game-over-213.mp3");

// 💰 BALANCE
let balance = localStorage.getItem("balance") || 1000;

function update(){
    document.getElementById("balance").innerText = balance;
    localStorage.setItem("balance", balance);
}
update();

// 📱 TABS
function show(id){
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// 📈 GRAPH
let ctx = chart.getContext("2d");
let points=[];

function draw(){
    ctx.fillStyle="#000";
    ctx.fillRect(0,0,300,150);

    ctx.strokeStyle="#00ff99";
    ctx.beginPath();

    points.forEach((p,i)=>{
        if(i===0) ctx.moveTo(0,150-p);
        else ctx.lineTo(i*5,150-p);
    });

    ctx.stroke();
}

// 🎮 GAME
let multi=1,game=false,int;

function start(){
    if(game) return;

    bg.play();

    let bet=parseInt(document.getElementById("bet").value);
    if(bet>balance) return;

    balance-=bet;
    update();

    game=true;
    multi=1;
    points=[];

    int=setInterval(()=>{
        multi+=0.05;
        points.push(multi*5);

        draw();
        fakePlayers();
        updateMulti();

        if(Math.random()<0.03){
            crash();
        }
    },100);
}

function crash(){
    clearInterval(int);
    game=false;

    lose.play();

    document.getElementById("multi").innerText="💥 CRASH";
    addHistory(multi);
}

function cash(){
    if(!game) return;

    clearInterval(int);

    let bet=parseInt(document.getElementById("bet").value);
    let winAmount=bet*multi;

    balance+=Math.floor(winAmount);
    update();

    win.play();

    game=false;
    document.getElementById("multi").innerText="💰 "+Math.floor(winAmount);
    addHistory(multi);
}

function updateMulti(){
    document.getElementById("multi").innerText="x"+multi.toFixed(2);
}

// 👥 PLAYERS
function fakePlayers(){
    let names=["Alex","Ivan","Max","Leo","Tom","Nick"];
    let el=document.createElement("div");

    el.innerText=names[Math.random()*names.length|0]+" x"+multi.toFixed(2);

    let box=document.getElementById("players");
    box.prepend(el);

    if(box.children.length>6){
        box.lastChild.remove();
    }
}

// 📊 HISTORY
function addHistory(x){
    let el=document.createElement("div");
    el.innerText="x"+x.toFixed(2);
    document.getElementById("history").prepend(el);
}

// 👤 PROFILE
function save(){
    let n=document.getElementById("name").value;
    let a=document.getElementById("avatar").value;

    localStorage.setItem("name",n);
    localStorage.setItem("avatar",a);

    load();
}

function load(){
    document.getElementById("nick").innerText=localStorage.getItem("name")||"";
    document.getElementById("img").src=localStorage.getItem("avatar")||"";
}
load();

</script>

</body>
</html>
