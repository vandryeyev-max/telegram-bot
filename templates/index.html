<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino X</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top,#0b1220,#020617);
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
}

.balance{
  color:#00f0ff;
  font-weight:bold;
}

/* BUTTON */
.btn{
  padding:16px;
  border-radius:15px;
  border:none;
  width:100%;
  margin-top:10px;
  background:linear-gradient(90deg,#6d5cff,#00f0ff);
  color:white;
  font-size:16px;
  transition:.2s;
  box-shadow:0 0 20px rgba(0,255,255,0.4);
}

.btn:active{
  transform:scale(0.95);
  box-shadow:0 0 5px cyan;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#020617;
  padding:10px 0;
}

.screen{display:none;padding:15px;}
.active{display:block;}

/* ===== ROULETTE ===== */
.wheel-wrap{
  position:relative;
  width:260px;
  margin:auto;
}

.pointer{
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  font-size:26px;
}

.wheel{
  width:260px;
  height:260px;
  border-radius:50%;
  transition:transform 4s cubic-bezier(.17,.67,.83,.67);
  box-shadow:0 0 40px rgba(0,255,255,0.4);
}

/* SELECT */
.select{
  display:flex;
  gap:10px;
  margin-top:15px;
}

.choice{
  flex:1;
  padding:12px;
  border-radius:10px;
  text-align:center;
  border:2px solid white;
}

.activeChoice{
  box-shadow:0 0 15px white;
}

/* ===== CRASH ===== */
canvas{
  width:100%;
  height:200px;
  background:black;
  border-radius:15px;
}

#mult{
  text-align:center;
  font-size:40px;
  color:#00f0ff;
}

/* PROFILE */
.avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  background:#222;
  margin:auto;
  overflow:hidden;
  box-shadow:0 0 25px cyan;
}
.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <div>Casino X</div>
  <div class="balance" id="balance">$1000</div>
</div>

<!-- ROULETTE -->
<div id="roulette" class="screen active">

<div class="wheel-wrap">
<div class="pointer">▼</div>
<div class="wheel" id="wheel"></div>
</div>

<div class="select">
<div id="redBtn" class="choice" style="background:red" onclick="pick('red')">RED</div>
<div id="blackBtn" class="choice" style="background:black" onclick="pick('black')">BLACK</div>
</div>

<input id="bet" value="100">
<button class="btn" onclick="spin()">Крутить</button>
<h2 id="result"></h2>

</div>

<!-- CRASH -->
<div id="crash" class="screen">
<canvas id="canvas"></canvas>
<div id="mult">x1.00</div>
<input id="bet2" value="100">
<button class="btn" onclick="startCrash()">СТАРТ</button>
<button class="btn" onclick="cashout()">ЗАБРАТЬ</button>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">
<div class="avatar" onclick="file.click()">
<img id="avatar">
</div>
<input type="file" id="file" style="display:none" onchange="loadAvatar(event)">
<h2 style="text-align:center;">Игрок</h2>
<p style="text-align:center;" id="bal2"></p>
</div>

<div class="nav">
<div onclick="show('roulette')">🎰</div>
<div onclick="show('crash')">🚀</div>
<div onclick="show('profile')">👤</div>
</div>

<script>
let balance=1000;
let selected="red";
const wheel=document.getElementById("wheel");
const colors=[];

for(let i=0;i<20;i++){
  colors.push(i%2===0?"red":"black");
}

wheel.style.background="conic-gradient("+colors.map((c,i)=>c+" "+i*18+"deg "+(i+1)*18+"deg").join(",")+")";

function update(){
  balanceEl.innerText="$"+balance;
  bal2.innerText="$"+balance;
}

function pick(c){
  selected=c;
  redBtn.classList.toggle("activeChoice",c==="red");
  blackBtn.classList.toggle("activeChoice",c==="black");
}

function spin(){
  let bet=+betInput.value;
  if(balance<bet)return;

  balance-=bet;
  update();

  let index=Math.floor(Math.random()*20);
  let win=colors[index];

  let deg=360*5+(index*18);
  wheel.style.transform="rotate(-"+deg+"deg)";

  setTimeout(()=>{
    if(win===selected){
      balance+=bet*2;
      result.innerText="ВЫИГРАЛ";
    }else{
      result.innerText="ПРОИГРАЛ";
    }
    update();
  },4000);
}

/* CRASH */
let m=1,playing=false;
const ctx=canvas.getContext("2d");
let points=[];

function startCrash(){
  let bet=+bet2.value;
  if(balance<bet)return;

  balance-=bet;
  update();

  m=1;
  playing=true;
  points=[];

  let crash=Math.random()*3+1;

  let int=setInterval(()=>{
    if(!playing)return;

    m+=0.05;
    mult.innerText="x"+m.toFixed(2);
    points.push(m);

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.beginPath();
    ctx.strokeStyle="cyan";
    ctx.lineWidth=3;

    points.forEach((p,i)=>{
      let x=i*4;
      let y=canvas.height-p*25;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });

    ctx.stroke();

    if(m>=crash){
      playing=false;
      mult.innerText="💥 CRASH";
      clearInterval(int);
    }
  },50);
}

function cashout(){
  if(playing){
    balance+=Math.floor(m*100);
    playing=false;
    update();
  }
}

function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function loadAvatar(e){
  let r=new FileReader();
  r.onload=()=>avatar.src=r.result;
  r.readAsDataURL(e.target.files[0]);
}

const balanceEl=document.getElementById("balance");
const bal2=document.getElementById("bal2");
const betInput=document.getElementById("bet");
const bet2=document.getElementById("bet2");
const result=document.getElementById("result");

update();
</script>

</body>
</html>
