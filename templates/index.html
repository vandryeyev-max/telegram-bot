<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Casino</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b0b;
    color: white;
}

.header {
    display: flex;
    justify-content: space-between;
    padding: 15px;
    font-size: 18px;
    border-bottom: 1px solid #222;
}

.menu {
    display: flex;
    gap: 10px;
    padding: 10px;
}

.tab {
    flex: 1;
    padding: 12px;
    background: #111;
    border-radius: 10px;
    text-align: center;
}

.section {
    display: none;
    padding: 15px;
}

.active {
    display: block;
}

.card {
    background: #111;
    padding: 15px;
    border-radius: 12px;
    margin-top: 10px;
}

button {
    padding: 12px;
    margin-top: 10px;
    width: 100%;
    background: #1f1f1f;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
}

button:active {
    background: #333;
}
</style>

</head>
<body>

<div class="header">
    Казино 🎰
    <div>💰 <span id="balance">1000</span></div>
</div>

<div class="menu">
    <div class="tab" onclick="openTab('games')">Игры</div>
    <div class="tab" onclick="openTab('profile')">Профиль</div>
</div>

<!-- ИГРЫ -->
<div id="games" class="section active">

    <div class="card">
        <h3>🃏 Blackjack</h3>
        <button onclick="blackjack()">Играть</button>
    </div>

    <div class="card">
        <h3>🎡 Рулетка</h3>
        <button onclick="roulette()">Крутить</button>
    </div>

    <div class="card">
        <h3>🚀 Lucky Jet</h3>
        <button onclick="lucky()">Запустить</button>
    </div>

    <p id="result"></p>

</div>

<!-- ПРОФИЛЬ -->
<div id="profile" class="section">

    <div class="card">
        <h3>👤 Профиль</h3>
        <input id="name" placeholder="Ник" style="width:100%; padding:10px;">
        <button onclick="saveProfile()">Сохранить</button>
        <p id="profileName"></p>
    </div>

</div>

<script>
let balance = 1000;

function update() {
    document.getElementById("balance").innerText = balance;
}

function openTab(tab) {
    document.querySelectorAll('.section').forEach(el => el.classList.remove('active'));
    document.getElementById(tab).classList.add('active');
}

function blackjack() {
    let win = Math.random() > 0.5;
    balance += win ? 100 : -100;
    document.getElementById("result").innerText =
        win ? "Выиграл 🎉" : "Проиграл 😢";
    update();
}

function roulette() {
    let win = Math.random() > 0.5;
    balance += win ? 200 : -200;
    document.getElementById("result").innerText =
        win ? "Красное 🔴 +200" : "Чёрное ⚫ -200";
    update();
}

function lucky() {
    let x = (Math.random() * 5).toFixed(2);
    let win = x > 2;

    balance += win ? 150 : -150;

    document.getElementById("result").innerText =
        "x" + x + (win ? " 🚀 WIN" : " 💥 LOSE");

    update();
}

function saveProfile() {
    let name = document.getElementById("name").value;
    document.getElementById("profileName").innerText = "Ник: " + name;
}
</script>

</body>
</html>
