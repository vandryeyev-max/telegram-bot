<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino MAX</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b15;
color:white;
overflow:hidden;
}

.header{
display:flex;
justify-content:space-between;
padding:15px;
align-items:center;
font-size:18px;
}

.balance{
color:#00ff9d;
font-weight:bold;
}

.screen{display:none;}
.active{display:block;}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.card{
background:#151520;
border-radius:20px;
padding:25px;
text-align:center;
font-size:18px;
transition:0.2s;
}

.card:active{
transform:scale(0.95);
}

.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#111;
padding:12px;
}

.canvas-box{
height:230px;
background:#0f0f1f;
border-radius:20px;
position:relative;
overflow:hidden;
}

canvas{
position:absolute;
}

.rocket{
position:absolute;
width:40px;
}

.multi{
text-align:center;
font-size:30px;
color:#00ffcc;
margin:10px;
font-weight:bold;
}

input{
width:100%;
padding:14px;
border-radius:12px;
border:none;
background:#111;
color:white;
font-size:16px;
margin-top:10px;
}

.btn{
width:100%;
padding:15px;
margin-top:10px;
border:none;
border-radius:14px;
font-size:16px;
font-weight:bold;
}

.green{background:#00ff9d;color:black;}
.red{background:#ff4d4d;}
</style>
</head>

<body>

<div id="menu" class="screen active">
<div class="header">
🎰 Casino
<div class="balance">$ <span id="bal1">1000</span></div>
</div>

<div class="grid">
<div class="card" onclick="openScreen('jet')">🚀 Lucky Jet</div>
<div class="card" onclick="openScreen('roulette')">🎡 Рулетка</div>
<div class="card" onclick="openScreen('profile')">👤 Профиль</div>
</div>
</div>

<div id="profile" class="screen">
<div class="header">
⬅ <span onclick="openScreen('menu')">Назад</span>
</div>
<h2 style="text-align:center">Игрок</h2>
<p style="text-align:center">Баланс: $<span id="bal2"></span></p>
</div>

<div id="jet" class="screen">
<div class="header">
⬅ <span onclick="openScreen('menu')">Назад</span>
<div class="balance">$ <span id="bal3"></span></div>
</div>

<div style="padding:10px">
<div class="canvas-box">
<canvas id="canvas"></canvas>
<img id="rocket" class="rocket" src="https://cdn-icons-png.flaticon.com/512/3219/3219536.png">
</div>

<div class="multi" id="multi">x1.00</div>

<input id="bet" value="100">

<button class="btn green" onclick="startGame()">СТАРТ</button>
<button class="btn red" onclick="cashOut()">ЗАБРАТЬ</button>
</div>
</div>

<div id="roulette" class="screen">
<div class="header">
⬅ <span onclick="openScreen('menu')">Назад</span>
</div>

<div style="padding:10px">
<input id="bet2" value="100">
<button class="btn green" onclick="spin()">Крутить</button>
<div class="multi" id="result"></div>
</div>
</div>

<div class="nav">
<div onclick="openScreen('menu')">🏠</div>
<div onclick="openScreen('jet')">🚀</div>
<div onclick="openScreen('profile')">👤</div>
</div>

<script>
let balance = 1000;

function updateBalance(){
bal1.innerText = balance;
bal2.innerText = balance;
bal3.innerText = balance;
}

updateBalance();

function openScreen(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

let running=false;
let multiplier=1;
let interval;

let ctx = canvas.getContext("2d");
canvas.width=300;
canvas.height=230;

function startGame(){
if(running)return;

let betVal = Number(document.getElementById("bet").value);

if(betVal > balance || betVal <= 0){
alert("Ошибка ставки");
return;
}

balance -= betVal;
updateBalance();

multiplier=1;
running=true;

ctx.clearRect(0,0,300,230);
ctx.beginPath();
ctx.moveTo(0,230);

interval=setInterval(()=>{
multiplier+=0.05;

let x=multiplier*25;
let y=230-multiplier*20;

ctx.lineTo(x,y);
ctx.strokeStyle="#00ffcc";
ctx.lineWidth=2;
ctx.stroke();

rocket.style.left=x+"px";
rocket.style.bottom=(multiplier*12)+"px";

multi.innerText="x"+multiplier.toFixed(2);

if(Math.random()<0.04){
crash();
}
},100);
}

function crash(){
clearInterval(interval);
running=false;
multi.innerText="💥 ПРОИГРАЛ";
}

function cashOut(){
if(!running)return;

clearInterval(interval);
running=false;

let betVal = Number(document.getElementById("bet").value);
let win = Math.floor(betVal * multiplier);

balance += win;
updateBalance();

multi.innerText="+"+win;
}

function spin(){
let betVal = Number(document.getElementById("bet2").value);

if(betVal > balance){
alert("Нет денег");
return;
}

balance -= betVal;

setTimeout(()=>{
let win = Math.random()>0.5;

if(win){
balance += betVal*2;
result.innerText="Выиграл 🎉";
}else{
result.innerText="Проиграл 😢";
}

updateBalance();
},1000);
}
</script>

</body>
</html>
