<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino ULTRA MAX</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#06060f;
color:white;
overflow:hidden;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:15px;
}

.balance{color:#00ffcc;font-weight:bold}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.card{
background:#111;
padding:20px;
border-radius:15px;
text-align:center;
font-size:18px;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#111;
padding:10px;
}

/* BUTTON */
.btn{
width:100%;
padding:14px;
border:none;
border-radius:12px;
margin-top:10px;
background:linear-gradient(90deg,#7c5cff,#00d4ff);
color:white;
font-weight:bold;
}

/* INPUT */
input{
width:100%;
padding:10px;
border-radius:10px;
border:none;
background:#111;
color:white;
}

/* SCREENS */
.screen{display:none}
.active{display:block}

/* PROFILE */
.avatar{
width:120px;
height:120px;
border-radius:50%;
margin:auto;
background:#222;
background-size:cover;
background-position:center;
}

/* GAME */
.game{
position:relative;
height:250px;
background:#0f0f1f;
border-radius:15px;
overflow:hidden;
}

canvas{
position:absolute;
}

.rocket{
position:absolute;
font-size:26px;
filter:drop-shadow(0 0 10px #ff6600);
}

/* PARTICLES */
.particle{
position:absolute;
width:4px;
height:4px;
background:orange;
border-radius:50%;
}

/* ROULETTE */
.wheel{
width:260px;
height:260px;
border-radius:50%;
margin:20px auto;
background:conic-gradient(
red 0 10%, black 10% 20%, red 20% 30%, black 30% 40%,
red 40% 50%, black 50% 60%, red 60% 70%, black 70% 80%,
red 80% 90%, black 90% 100%
);
transition:4s cubic-bezier(.1,.7,.1,1);
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen active">
<div class="header">
🎰 Casino ULTRA
<div class="balance">$ <span id="bal"></span></div>
</div>

<div class="grid">
<div class="card" onclick="openScreen('jet')">🚀 Lucky Jet</div>
<div class="card" onclick="openScreen('roulette')">🎡 Рулетка</div>
<div class="card" onclick="openScreen('profile')">👤 Профиль</div>
</div>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">
<div class="header">
⬅ <span onclick="openScreen('menu')">Назад</span>
</div>

<div style="text-align:center">
<div class="avatar" id="avatar"></div>
<input type="file" onchange="changeAvatar(event)">
<h2>Игрок</h2>
<p>Баланс: $<span id="bal2"></span></p>
</div>
</div>

<!-- LUCKY JET -->
<div id="jet" class="screen">
<div class="header">
⬅ <span onclick="openScreen('menu')">Назад</span>
<div class="balance">$ <span id="bal3"></span></div>
</div>

<div class="game">
<canvas id="c"></canvas>
<div class="rocket" id="rocket">🚀</div>
</div>

<div style="text-align:center;font-size:28px" id="multi">x1.00</div>

<input id="bet" value="100">

<button class="btn" onclick="start()">СТАВКА</button>
<button class="btn" onclick="take()">ЗАБРАТЬ</button>
</div>

<!-- ROULETTE -->
<div id="roulette" class="screen">
<div class="header">
⬅ <span onclick="openScreen('menu')">Назад</span>
<div class="balance">$ <span id="bal4"></span></div>
</div>

<div class="wheel" id="wheel"></div>

<input id="bet2" value="100">
<button class="btn" onclick="spin()">Крутить</button>

<p id="res" style="text-align:center"></p>
</div>

<!-- NAV -->
<div class="nav">
<div onclick="openScreen('menu')">🏠</div>
<div onclick="openScreen('jet')">🚀</div>
<div onclick="openScreen('profile')">👤</div>
</div>

<script>
let balance=1000;

function update(){
bal.innerText=balance;
bal2.innerText=balance;
bal3.innerText=balance;
bal4.innerText=balance;
}
update();

function openScreen(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* PROFILE */
function changeAvatar(e){
let file=e.target.files[0];
let reader=new FileReader();
reader.onload=function(){
avatar.style.backgroundImage="url("+reader.result+")";
}
reader.readAsDataURL(file);
}

/* SOUND */
function sound(freq){
let ctx=new AudioContext();
let o=ctx.createOscillator();
o.frequency.value=freq;
o.connect(ctx.destination);
o.start();
setTimeout(()=>o.stop(),100);
}

/* LUCKY JET */
let ctx=c.getContext("2d");
c.width=350;
c.height=250;

let run=false;
let m=1;
let int;

function start(){
if(run)return;

let b=+bet.value;
if(b>balance)return;

balance-=b;
update();

run=true;
m=1;

ctx.clearRect(0,0,c.width,c.height);
ctx.beginPath();
ctx.moveTo(0,240);

int=setInterval(()=>{
m+=0.03;

let x=m*30;
let y=240-m*25;

ctx.lineTo(x,y);
ctx.strokeStyle="#7c5cff";
ctx.stroke();

rocket.style.left=x+"px";
rocket.style.top=y+"px";

/* particles */
let p=document.createElement("div");
p.className="particle";
p.style.left=x+"px";
p.style.top=y+"px";
document.body.appendChild(p);

setTimeout(()=>p.remove(),300);

multi.innerText="x"+m.toFixed(2);

if(Math.random()<0.02){
crash();
}
},40);
}

function crash(){
clearInterval(int);
run=false;
multi.innerText="💥 Crash";
sound(100);
}

function take(){
if(!run)return;

clearInterval(int);
run=false;

let b=+bet.value;
let win=Math.floor(b*m);

balance+=win;
update();

multi.innerText="+"+win;
sound(400);
}

/* ROULETTE */
function spin(){
let b=+bet2.value;
if(b>balance)return;

balance-=b;
update();

let deg=3600 + Math.random()*360;
wheel.style.transform="rotate("+deg+"deg)";

setTimeout(()=>{
let win=Math.random()>0.5;

if(win){
balance+=b*2;
res.innerText="Выиграл 🎉";
sound(500);
}else{
res.innerText="Проиграл";
sound(150);
}

update();
},4000);
}
</script>

</body>
</html>
