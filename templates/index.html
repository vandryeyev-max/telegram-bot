<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino ULTRA</title>

<style>
body{
margin:0;
font-family:system-ui;
background:radial-gradient(circle at top,#0a0a15,#05050a);
color:white;
overflow:hidden;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:15px;
font-size:18px;
}

.balance{
color:#00ffcc;
font-weight:bold;
}

/* SCREEN */
.screen{display:none;}
.active{display:block;}

/* MENU */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
padding:15px;
}

.card{
background:linear-gradient(135deg,#1a1a2e,#0f0f1f);
border-radius:20px;
padding:20px;
text-align:center;
font-size:18px;
box-shadow:0 0 20px rgba(124,92,255,0.2);
}

/* BUTTON */
.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
margin-top:10px;
background:linear-gradient(90deg,#7c5cff,#00d4ff);
color:white;
font-weight:bold;
}

/* INPUT */
input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#111;
color:white;
margin-top:10px;
}

/* LUCKY JET */
.game{
height:260px;
background:#0f0f1f;
border-radius:20px;
position:relative;
overflow:hidden;
}

canvas{
position:absolute;
}

.multi{
text-align:center;
font-size:32px;
margin:10px;
color:#00ffcc;
}

/* PROFILE */
.profile{
text-align:center;
margin-top:30px;
}

.avatar{
width:110px;
height:110px;
border-radius:50%;
margin:auto;
background:url('https://i.imgur.com/8Km9tLL.png');
background-size:cover;
box-shadow:0 0 20px #7c5cff;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:space-around;
background:#111;
padding:12px;
}
</style>
</head>

<body>

<!-- MENU -->
<div id="menu" class="screen active">
<div class="header">
🎰 Casino ULTRA
<div class="balance">$ <span id="b1"></span></div>
</div>

<div class="grid">
<div class="card" onclick="openScreen('jet')">🚀 Lucky Jet</div>
<div class="card" onclick="openScreen('roulette')">🎡 Рулетка</div>
<div class="card" onclick="openScreen('profile')">👤 Профиль</div>
</div>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">
<div class="header">
⬅ <span onclick="openScreen('menu')">Назад</span>
</div>

<div class="profile">
<div class="avatar"></div>
<h2>Игрок</h2>
<p>Баланс: $<span id="b2"></span></p>
</div>
</div>

<!-- LUCKY JET -->
<div id="jet" class="screen">
<div class="header">
⬅ <span onclick="openScreen('menu')">Назад</span>
<div class="balance">$ <span id="b3"></span></div>
</div>

<div style="padding:10px">

<div class="game">
<canvas id="c"></canvas>
</div>

<div class="multi" id="multi">x1.00</div>

<input id="bet" value="100">

<button class="btn" onclick="start()">СТАВКА</button>
<button class="btn" onclick="take()">ЗАБРАТЬ</button>

</div>
</div>

<!-- ROULETTE -->
<div id="roulette" class="screen">
<div class="header">
⬅ <span onclick="openScreen('menu')">Назад</span>
<div class="balance">$ <span id="b4"></span></div>
</div>

<div style="text-align:center">
<input id="bet2" value="100">
<button class="btn" onclick="spin()">Крутить</button>
<p id="res"></p>
</div>
</div>

<div class="nav">
<div onclick="openScreen('menu')">🏠</div>
<div onclick="openScreen('jet')">🚀</div>
<div onclick="openScreen('profile')">👤</div>
</div>

<script>
let balance=1000;

function upd(){
b1.innerText=balance;
b2.innerText=balance;
b3.innerText=balance;
b4.innerText=balance;
}
upd();

function openScreen(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* SOUND */
function beep(){
let ctx=new AudioContext();
let o=ctx.createOscillator();
o.type="sine";
o.frequency.value=200;
o.connect(ctx.destination);
o.start();
setTimeout(()=>o.stop(),100);
}

/* LUCKY JET */
let ctx=c.getContext('2d');
c.width=350;
c.height=260;

let running=false;
let multi=1;
let int;

function start(){
if(running)return;

let b=+bet.value;
if(b>balance)return;

balance-=b;
upd();

running=true;
multi=1;

ctx.clearRect(0,0,c.width,c.height);
ctx.beginPath();
ctx.moveTo(0,260);

int=setInterval(()=>{
multi+=0.02;

let x=multi*40;
let y=260-multi*30;

ctx.lineTo(x,y);
ctx.strokeStyle="#7c5cff";
ctx.lineWidth=3;
ctx.stroke();

document.getElementById("multi").innerText="x"+multi.toFixed(2);

if(Math.random()<0.02){
crash();
}
},40);
}

function crash(){
clearInterval(int);
running=false;
document.getElementById("multi").innerText="💥 Crash";
beep();
}

function take(){
if(!running)return;

clearInterval(int);
running=false;

let b=+bet.value;
let win=Math.floor(b*multi);

balance+=win;
upd();

document.getElementById("multi").innerText="+"+win;
beep();
}

/* ROULETTE */
function spin(){
let b=+bet2.value;
if(b>balance)return;

balance-=b;
upd();

setTimeout(()=>{
let win=Math.random()>0.5;

if(win){
balance+=b*2;
res.innerText="Выиграл 🎉";
}else{
res.innerText="Проиграл";
}
upd();
beep();
},1000);
}
</script>

</body>
</html>
