<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casino X PRO</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:15px;
}

.balance{
  color:#00f0ff;
  font-size:18px;
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  justify-content:space-around;
  background:#020617;
  padding:10px 0;
}

/* SCREEN */
.screen{display:none;padding:15px;}
.active{display:block;}

.btn{
  background:linear-gradient(90deg,#6d5cff,#00f0ff);
  border:none;
  padding:15px;
  border-radius:15px;
  color:white;
  width:100%;
  margin-top:10px;
  font-size:16px;
  box-shadow:0 0 15px rgba(0,255,255,0.3);
}

/* ROULETTE */
.wheel-wrap{
  position:relative;
  width:260px;
  margin:auto;
}

.pointer{
  position:absolute;
  top:-10px;
  left:50%;
  transform:translateX(-50%);
  font-size:30px;
}

.wheel{
  width:260px;
  height:260px;
  border-radius:50%;
  transition:transform 3s cubic-bezier(.17,.67,.83,.67);
  box-shadow:0 0 40px rgba(0,255,255,0.3);
}

/* CRASH */
canvas{
  width:100%;
  height:200px;
  background:#000;
  border-radius:15px;
  box-shadow:0 0 25px rgba(0,255,255,0.3);
}

#mult{
  font-size:40px;
  text-align:center;
  color:#00f0ff;
}

/* PROFILE */
.avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  background:#222;
  margin:auto;
  overflow:hidden;
  box-shadow:0 0 20px rgba(0,255,255,0.5);
}

.avatar img{
  width:100%;
  height:100%;
  object-fit:cover;
}

input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <div>Casino PRO</div>
  <div class="balance" id="balance">$1000</div>
</div>

<!-- ROULETTE -->
<div id="roulette" class="screen active">

<div class="wheel-wrap">
  <div class="pointer">▼</div>
  <div class="wheel" id="wheel"></div>
</div>

<div style="display:flex;gap:10px;margin-top:15px;">
<button onclick="pick('red')" style="flex:1;background:red;">RED</button>
<button onclick="pick('black')" style="flex:1;background:black;">BLACK</button>
</div>

<input id="bet" value="100">
<button class="btn" onclick="spin()">Крутить</button>
<h2 id="result"></h2>

</div>

<!-- CRASH -->
<div id="crash" class="screen">
<canvas id="canvas"></canvas>
<div id="mult">x1.00</div>
<input id="bet2" value="100">
<button class="btn" onclick="startCrash()">СТАРТ</button>
<button class="btn" onclick="cashout()">ЗАБРАТЬ</button>
<button class="btn" onclick="autoBet()">AUTO</button>
</div>

<!-- PROFILE -->
<div id="profile" class="screen">
<div class="avatar" onclick="upload()">
<img id="avatar">
</div>
<input type="file" id="file" style="display:none" onchange="loadAvatar(event)">
<h2 style="text-align:center;">Игрок</h2>
<p style="text-align:center;" id="bal2">$1000</p>
</div>

<div class="nav">
<div onclick="show('roulette')">🎰</div>
<div onclick="show('crash')">🚀</div>
<div onclick="show('profile')">👤</div>
</div>

<script>
let balance = localStorage.getItem("bal") || 1000;
let selected="red";
let sound=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

function updateBalance(){
  balanceEl.innerText="$"+balance;
  bal2.innerText="$"+balance;
  localStorage.setItem("bal", balance);
}

const balanceEl=document.getElementById("balance");
const bal2=document.getElementById("bal2");

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function pick(c){selected=c;}

// рулетка
const wheel=document.getElementById("wheel");
let segments=20;
let colors=[];
for(let i=0;i<segments;i++){
  colors.push(i%2===0?"red":"black");
}
wheel.style.background="conic-gradient("+colors.map((c,i)=>c+" "+i*(360/segments)+"deg "+(i+1)*(360/segments)+"deg").join(",")+")";

function spin(){
  let bet=+betInput.value;
  if(balance<bet)return;

  balance-=bet;
  updateBalance();

  let index=Math.floor(Math.random()*segments);
  let winColor=colors[index];

  let deg=360*6+(360/segments)*index;
  wheel.style.transform="rotate(-"+deg+"deg)";
  sound.play();

  setTimeout(()=>{
    if(winColor===selected){
      balance+=bet*2;
      result.innerText="ВЫИГРАЛ 🎉";
    }else{
      result.innerText="ПРОИГРАЛ ❌";
    }
    updateBalance();
  },3000);
}

// crash
let m=1,playing=false,points=[];
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

function startCrash(){
  let bet=+bet2.value;
  if(balance<bet)return;

  balance-=bet;
  updateBalance();

  m=1;
  playing=true;
  points=[];

  let crashPoint=Math.random()*3+1;

  let interval=setInterval(()=>{
    if(!playing)return;

    m+=0.04;
    mult.innerText="x"+m.toFixed(2);
    points.push(m);

    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.beginPath();
    ctx.strokeStyle="cyan";
    ctx.lineWidth=2;

    points.forEach((p,i)=>{
      let x=i*4;
      let y=canvas.height-p*30;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });

    ctx.stroke();

    if(m>=crashPoint){
      playing=false;
      mult.innerText="💥 CRASH";
      sound.play();
      clearInterval(interval);
    }
  },50);
}

function cashout(){
  if(playing){
    balance+=Math.floor(m*100);
    playing=false;
    updateBalance();
  }
}

// авто ставка
function autoBet(){
  setInterval(()=>{
    if(!playing) startCrash();
  },2000);
}

// профиль
function upload(){file.click();}
function loadAvatar(e){
  let r=new FileReader();
  r.onload=()=>avatar.src=r.result;
  r.readAsDataURL(e.target.files[0]);
}

const betInput=document.getElementById("bet");
const bet2=document.getElementById("bet2");
const result=document.getElementById("result");

updateBalance();
</script>

</body>
</html>
