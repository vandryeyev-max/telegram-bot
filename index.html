<!DOCTYPE html>
<html>
<head>
    <title>Casino 🎰</title>
    <style>
        body {
            background: black;
            color: white;
            text-align: center;
            font-family: Arial;
        }
        button {
            padding: 20px;
            font-size: 20px;
            margin: 20px;
        }
    </style>
</head>
<body>

<h1>🎰 Casino</h1>
<p id="balance">Balance: $1000</p>

<button onclick="play()">🎲 Играть</button>

<script>
let balance = 1000;

function play() {
    let win = Math.random() > 0.5;

    if (win) {
        balance += 100;
        alert("Ты выиграл 💰");
    } else {
        balance -= 100;
        alert("Ты проиграл 😢");
    }

    document.getElementById("balance").innerText = "Balance: $" + balance;
}
</script>

</body>
</html>
